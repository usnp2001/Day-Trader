<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>當沖看盤選股平台 - 安全登入</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0c0f12;
            --card-bg: rgba(22, 28, 36, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-green: #00b06b;
            --accent-green-hover: #00d984;
            --text-primary: #e1e7ed;
            --text-secondary: #8e9aa8;
            --input-bg: #131722;
            --error-color: #f23645;
            --success-color: #089981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Outfit', system-ui, -apple-system, sans-serif;
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        ::-webkit-scrollbar {
            display: none; /* Chrome, Safari, Opera */
        }

        html, body {
            overflow-y: auto;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 176, 107, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(19, 23, 34, 0.8) 0px, transparent 50%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px 0;
        }

        /* Glassmorphism Card Wrapper */
        .auth-container {
            width: 480px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.5);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .auth-container::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 20%;
            right: 20%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-green), transparent);
        }

        /* Logo & Header */
        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-logo {
            font-family: 'Outfit', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .auth-logo span {
            color: var(--accent-green);
        }

        .auth-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* Switch Tabs */
        .auth-tabs {
            display: flex;
            background: var(--input-bg);
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .auth-tab.active {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 14px 16px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            border-color: var(--accent-green);
            box-shadow: 0 0 0 3px rgba(0, 176, 107, 0.15);
        }

        /* Primary Button */
        .btn-submit {
            width: 100%;
            background: var(--accent-green);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(0, 176, 107, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 28px;
        }

        .btn-submit:hover {
            background: var(--accent-green-hover);
            box-shadow: 0 6px 16px rgba(0, 176, 107, 0.3);
            transform: translateY(-1px);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        /* Error/Success Alert Box */
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 8px;
            animation: fadeIn 0.3s ease;
        }

        .alert-error {
            background: rgba(242, 54, 69, 0.1);
            border: 1px solid rgba(242, 54, 69, 0.2);
            color: #ff5a6a;
        }

        .alert-success {
            background: rgba(8, 153, 129, 0.1);
            border: 1px solid rgba(8, 153, 129, 0.2);
            color: #0ada9b;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Dynamic Sliding Panels */
        .auth-forms-wrapper {
            overflow: hidden;
            width: 100%;
        }

        .auth-forms-slider {
            display: flex;
            width: 200%;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .auth-form-panel {
            width: 50%;
            padding: 2px;
        }

        /* 2-Column Registration Form Grid */
        .register-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .form-group-full {
            grid-column: 1 / -1;
        }

        /* Footer Info */
        .auth-footer {
            margin-top: 24px;
            text-align: center;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .auth-footer a {
            color: var(--accent-green);
            text-decoration: none;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <!-- Logo Header -->
        <div class="auth-header">
            <div class="auth-logo">ANTIGRAVITY <span>TRADE</span></div>
            <div class="auth-subtitle" id="auth-subtitle-text">看盤選股交易系統</div>
        </div>

        <!-- Tab switches -->
        <div class="auth-tabs">
            <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">登入帳戶</div>
            <div class="auth-tab" id="tab-register" onclick="switchTab('register')">註冊新帳戶</div>
        </div>

        <!-- Alerts -->
        <div class="alert alert-error" id="alert-error"></div>
        <div class="alert alert-success" id="alert-success"></div>

        <!-- Sliding Forms -->
        <div class="auth-forms-wrapper">
            <div class="auth-forms-slider" id="forms-slider">
                
                <!-- LOGIN PANEL -->
                <div class="auth-form-panel">
                    <form id="form-login" onsubmit="handleLogin(event)">
                        <div class="form-group">
                            <label class="form-label" for="login-username">使用者帳號</label>
                            <input class="form-input" type="text" id="login-username" placeholder="請輸入帳號" required autocomplete="username">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="login-password">密碼</label>
                            <input class="form-input" type="password" id="login-password" placeholder="請輸入密碼" required autocomplete="current-password">
                        </div>
                        <button type="submit" class="btn-submit" id="btn-login-submit">
                            確認登入
                        </button>
                    </form>
                </div>

                 <!-- REGISTER PANEL -->
                <div class="auth-form-panel">
                    <form id="form-register" onsubmit="handleRegister(event)">
                        <div class="register-grid">
                            <div class="form-group">
                                <label class="form-label" for="register-username">使用者帳號</label>
                                <input class="form-input" type="text" id="register-username" placeholder="設定 4-15 字元" required minlength="3" maxlength="15" autocomplete="username">
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="register-password">設定密碼</label>
                                <input class="form-input" type="password" id="register-password" placeholder="請設定 6 位數以上" required minlength="6" autocomplete="new-password">
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="register-name">真實姓名</label>
                                <input class="form-input" type="text" id="register-name" placeholder="請輸入姓名" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="register-email">電子信箱 (Email)</label>
                                <input class="form-input" type="email" id="register-email" placeholder="example@email.com" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="register-phone">聯絡電話</label>
                                <input class="form-input" type="tel" id="register-phone" placeholder="例如: 0912345678" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="register-address">通訊地址</label>
                                <input class="form-input" type="text" id="register-address" placeholder="請輸入完整通訊地址" required>
                            </div>
                            <div class="form-group form-group-full">
                                <label class="form-label" for="register-avatar">上傳個人大頭照</label>
                                <input class="form-input" type="file" id="register-avatar" accept="image/*" onchange="uploadAvatarFile(this, 'register-avatar-url', 'register-avatar-preview')">
                                <input type="hidden" id="register-avatar-url">
                                <div style="margin-top: 8px; display: none;" id="register-avatar-preview-container">
                                    <img id="register-avatar-preview" src="" style="width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent-green);">
                                </div>
                            </div>
                        </div>
                        <button type="submit" class="btn-submit" id="btn-register-submit" style="margin-top: 16px;">
                            註冊並建立帳戶
                        </button>
                    </form>
                </div>

            </div>
        </div>

        <div class="auth-footer">
            預設管理員帳密：<span style="color: var(--text-primary);">admin</span> / <span style="color: var(--text-primary);">admin123</span>
        </div>
    </div>

    <script>
        const formsSlider = document.getElementById('forms-slider');
        const tabLogin = document.getElementById('tab-login');
        const tabRegister = document.getElementById('tab-register');
        const subtitleText = document.getElementById('auth-subtitle-text');
        
        const alertError = document.getElementById('alert-error');
        const alertSuccess = document.getElementById('alert-success');

        function switchTab(mode) {
            hideAlerts();
            if (mode === 'login') {
                tabLogin.classList.add('active');
                tabRegister.classList.remove('active');
                formsSlider.style.transform = 'translateX(0%)';
                subtitleText.textContent = '看盤選股交易系統';
            } else {
                tabLogin.classList.remove('active');
                tabRegister.classList.add('active');
                formsSlider.style.transform = 'translateX(-50%)';
                subtitleText.textContent = '建立新交易帳戶';
            }
        }

        function showAlert(type, message) {
            hideAlerts();
            if (type === 'error') {
                alertError.textContent = message;
                alertError.style.display = 'flex';
            } else {
                alertSuccess.textContent = message;
                alertSuccess.style.display = 'flex';
            }
        }

        function hideAlerts() {
            alertError.style.display = 'none';
            alertSuccess.style.display = 'none';
        }

        async function handleLogin(e) {
            e.preventDefault();
            hideAlerts();
            
            const usernameInput = document.getElementById('login-username');
            const passwordInput = document.getElementById('login-password');
            const submitBtn = document.getElementById('btn-login-submit');

            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            submitBtn.disabled = true;
            submitBtn.textContent = '登入驗證中...';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                if (response.ok && data.status === 200) {
                    // Store Token, Username and Role
                    localStorage.setItem('token', data.result.access_token);
                    localStorage.setItem('username', data.result.username);
                    localStorage.setItem('role', data.result.role);
                    
                    showAlert('success', '驗證成功！正在引導進入系統...');
                    setTimeout(() => {
                        window.location.href = '/index.html';
                    }, 800);
                } else {
                    showAlert('error', data.detail || '登入失敗，帳號或密碼輸入錯誤');
                    submitBtn.disabled = false;
                    submitBtn.textContent = '確認登入';
                }
            } catch (err) {
                showAlert('error', '連線伺服器失敗，請檢查網路連線。');
                submitBtn.disabled = false;
                submitBtn.textContent = '確認登入';
            }
        }

        async function uploadAvatarFile(input, targetUrlInputId, previewImgId) {
            if (!input.files || input.files.length === 0) return;
            const file = input.files[0];
            
            const formData = new FormData();
            formData.append("file", file);
            
            try {
                showAlert('success', '大頭照圖片上傳中...');
                const response = await fetch('/api/upload_avatar', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                if (response.ok && data.status === 200) {
                    document.getElementById(targetUrlInputId).value = data.result.avatar_url;
                    const previewImg = document.getElementById(previewImgId);
                    previewImg.src = data.result.avatar_url;
                    previewImg.parentElement.style.display = 'block';
                    showAlert('success', '大頭照上傳成功！');
                } else {
                    showAlert('error', data.detail || '圖片上傳失敗，格式不符或檔案過大');
                }
            } catch (err) {
                showAlert('error', '大頭照上傳失敗，伺服器連線異常。');
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            hideAlerts();

            const usernameInput = document.getElementById('register-username');
            const passwordInput = document.getElementById('register-password');
            const emailInput = document.getElementById('register-email');
            const nameInput = document.getElementById('register-name');
            const phoneInput = document.getElementById('register-phone');
            const addressInput = document.getElementById('register-address');
            const avatarUrlInput = document.getElementById('register-avatar-url');
            const submitBtn = document.getElementById('btn-register-submit');

            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            const email = emailInput.value.trim();
            const name = nameInput.value.trim();
            const phone = phoneInput.value.trim();
            const address = addressInput.value.trim();
            const profile_pic = avatarUrlInput.value;

            submitBtn.disabled = true;
            submitBtn.textContent = '帳戶建立中...';

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username,
                        password,
                        email,
                        name,
                        phone,
                        address,
                        profile_pic
                    })
                });

                const data = await response.json();
                if (response.ok) {
                    showAlert('success', '帳戶建立成功！即將引導登入...');
                    usernameInput.value = '';
                    passwordInput.value = '';
                    emailInput.value = '';
                    nameInput.value = '';
                    phoneInput.value = '';
                    addressInput.value = '';
                    avatarUrlInput.value = '';
                    document.getElementById('register-avatar-preview-container').style.display = 'none';
                    setTimeout(() => {
                        switchTab('login');
                        document.getElementById('login-username').value = username;
                        submitBtn.disabled = false;
                        submitBtn.textContent = '註冊並建立帳戶';
                    }, 1200);
                } else {
                    showAlert('error', data.detail || '註冊失敗，該使用者名稱可能已存在');
                    submitBtn.disabled = false;
                    submitBtn.textContent = '註冊並建立帳戶';
                }
            } catch (err) {
                showAlert('error', '連線伺服器失敗，請確認網路狀態。');
                submitBtn.disabled = false;
                submitBtn.textContent = '註冊並建立帳戶';
            }
        }
        
        // Auto-check if already logged in, redirect to index
        if (localStorage.getItem('token')) {
            window.location.href = '/index.html';
        }
    </script>
</body>
</html>
