<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>當沖看盤選股平台 - 管理者後台</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        // Synchronous Security Check before page load
        if (!localStorage.getItem('token')) {
            window.location.href = '/login.html';
        } else if (localStorage.getItem('role') !== 'admin') {
            window.location.href = '/index.html';
        }
    </script>
    <style>
        :root {
            --bg-color: #0c0f12;
            --card-bg: #161c24;
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-green: #00b06b;
            --accent-green-hover: #00d984;
            --text-primary: #e1e7ed;
            --text-secondary: #8e9aa8;
            --input-bg: #131722;
            --error-color: #f23645;
            --success-color: #089981;
            --danger-bg: rgba(242, 54, 69, 0.1);
            --danger-text: #ff5a6a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 40px;
        }

        /* Layout Grid */
        .admin-wrapper {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Top Header */
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        .admin-title h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            font-weight: 600;
        }

        .admin-title p {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .header-actions {
            display: flex;
            gap: 16px;
        }

        .btn {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-secondary {
            background: #202630;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: #2a323f;
        }

        .btn-primary {
            background: var(--accent-green);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--accent-green-hover);
        }

        /* Main Dashboard Sections */
        .admin-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 40px;
        }

        /* Glassmorphism Card Style */
        .panel-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 28px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
        }

        .panel-card h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 24px;
            border-left: 3px solid var(--accent-green);
            padding-left: 10px;
        }

        /* Forms */
        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .form-input, .form-select {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }

        .form-input:focus, .form-select:focus {
            border-color: var(--accent-green);
        }

        .btn-full {
            width: 100%;
            margin-top: 10px;
        }

        /* Table design */
        .users-table-container {
            width: 100%;
            overflow-x: auto;
        }

        .users-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }

        .users-table th, .users-table td {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .users-table th {
            font-weight: 600;
            color: var(--text-secondary);
            background: rgba(0, 0, 0, 0.15);
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        .users-table tr:hover td {
            background: rgba(255, 255, 255, 0.015);
        }

        .role-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .role-admin {
            background: rgba(0, 176, 107, 0.1);
            color: var(--accent-green);
            border: 1px solid rgba(0, 176, 107, 0.2);
        }

        .role-user {
            background: rgba(142, 154, 168, 0.1);
            color: var(--text-secondary);
            border: 1px solid rgba(142, 154, 168, 0.2);
        }

        .btn-delete {
            background: var(--danger-bg);
            color: var(--danger-text);
            border: 1px solid rgba(242, 54, 69, 0.2);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-delete:hover:not(:disabled) {
            background: var(--danger-text);
            color: #fff;
        }

        .btn-delete:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Feedback Alerts */
        .alert {
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }

        .alert-error {
            background: rgba(242, 54, 69, 0.1);
            border: 1px solid rgba(242, 54, 69, 0.2);
            color: #ff5a6a;
        }

        .alert-success {
            background: rgba(8, 153, 129, 0.1);
            border: 1px solid rgba(8, 153, 129, 0.2);
            color: #0ada9b;
        }

        /* Modal Overlay and Mask */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #161c24;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            width: 440px;
            max-width: 90%;
            padding: 32px;
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.6);
            animation: modalFadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 24px;
        }
    </style>
</head>
<body>

    <div class="admin-wrapper">
        <!-- Top header bar -->
        <header class="admin-header">
            <div class="admin-title">
                <h1>管理者主控台</h1>
                <p>管理登入帳戶、指派角色與檢視資金分配</p>
            </div>
            <div class="header-actions">
                <a href="/index.html" class="btn btn-secondary">回首頁</a>
                <button onclick="handleLogout()" class="btn btn-secondary">登出後台</button>
            </div>
        </header>

        <!-- Main Workspace -->
        <main class="admin-grid">
            
            <!-- Left/Top: Ace Watchlist Management Panel -->
            <section class="panel-card" style="grid-column: 1 / -1; margin-top: 20px;">
                <h2>艾斯選股參數與檔案管理</h2>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
                    <!-- Config Form -->
                    <div>
                        <h3 style="font-size: 14px; color: var(--text-secondary); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 0.5px;">自動下載設定</h3>
                        <form id="ace-config-form" onsubmit="saveAceConfig(event)">
                            <div class="form-group">
                                <label class="form-label" for="ace-url">聚財網策略 Excel 下載網址</label>
                                <input class="form-input" type="text" id="ace-url" placeholder="https://..." required>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="ace-cookies">Session Cookies (Cookie Header 字串)</label>
                                <textarea class="form-input" id="ace-cookies" rows="4" placeholder="key1=value1; key2=value2..." style="resize: vertical; height: 100px; font-family: monospace;" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary" id="btn-save-ace-config">儲存下載設定</button>
                        </form>
                    </div>
                    
                    <!-- File Upload & Operation -->
                    <div style="border-left: 1px solid var(--border-color); padding-left: 30px;">
                        <h3 style="font-size: 14px; color: var(--text-secondary); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 0.5px;">手動同步與清除操作</h3>
                        
                        <!-- Upload File form -->
                        <div class="form-group" style="margin-bottom: 25px;">
                            <label class="form-label">手動上傳選股 Excel (.xlsx / .xls)</label>
                            <div style="display: flex; gap: 10px; align-items: center;">
                                <input class="form-input" type="file" id="ace-file-upload" accept=".xlsx, .xls" style="padding: 8px;">
                                <button type="button" class="btn btn-primary" onclick="uploadAceExcelFile()" id="btn-upload-ace-excel">上傳並同步</button>
                            </div>
                            <p style="font-size: 11px; color: var(--text-secondary); margin-top: 6px;">
                                上傳後系統將自動解析、清洗代碼，並即時覆寫至資料庫中。
                            </p>
                        </div>
                        
                        <!-- Danger Area -->
                        <div style="background: rgba(242, 54, 69, 0.05); border: 1px solid rgba(242, 54, 69, 0.15); padding: 20px; border-radius: 8px;">
                            <h4 style="color: var(--danger-text); font-size: 13px; font-weight: 600; margin-bottom: 8px;">危險管理操作</h4>
                            <p style="font-size: 11px; color: var(--text-secondary); margin-bottom: 12px; line-height: 1.4;">
                                清除動作會同時將資料庫中當日的「艾斯選股名單」清空，並移除伺服器上所有快取的 Excel 檔案。
                            </p>
                            <div style="display: flex; align-items: center; justify-content: space-between;">
                                <span id="ace-file-status" style="font-size: 12px; color: var(--text-secondary);">下載狀態：檢查中...</span>
                                <button type="button" class="btn" style="background: var(--danger-bg); color: var(--danger-text); border: 1px solid rgba(242, 54, 69, 0.2); padding: 8px 16px; font-size: 12px;" onclick="clearAceData()" id="btn-clear-ace-data">清除資料與暫存檔</button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
            
            <!-- Right Side: User Accounts List -->
            <section class="panel-card" style="grid-column: 1 / -1; margin-top: 20px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                    <h2 style="margin-bottom: 0; border-left: 3px solid var(--accent-green); padding-left: 10px; font-size: 18px;">系統所有註冊帳戶列表</h2>
                    <button class="btn btn-primary" onclick="openCreateUserModal()">開立新交易帳戶</button>
                </div>
                <div class="users-table-container">
                    <table class="users-table">
                        <thead>
                            <tr>
                                <th>帳戶與頭像</th>
                                <th>基本聯絡資訊</th>
                                <th>角色權限</th>
                                <th>可用資金 (TWD)</th>
                                <th>帳戶狀態</th>
                                <th>功能操作</th>
                            </tr>
                        </thead>
                        <tbody id="users-list-body">
                            <!-- Populated dynamically -->
                        </tbody>
                    </table>
                </div>
            </section>

        </main>
    </div>

    <!-- Create User Modal -->
    <div class="modal-overlay" id="create-user-modal" style="display: none;">
        <div class="modal-content">
            <h2 style="margin-bottom: 20px; border-left: 3px solid var(--accent-green); padding-left: 10px; font-size: 18px;">開立新交易帳戶</h2>
            <div class="alert alert-error" id="form-error"></div>
            <div class="alert alert-success" id="form-success"></div>

            <form id="create-user-form" onsubmit="handleCreateUser(event)">
                <div class="form-group">
                    <label class="form-label" for="new-username">使用者帳號</label>
                    <input class="form-input" type="text" id="new-username" placeholder="英文或數字" required minlength="3">
                </div>
                <div class="form-group">
                    <label class="form-label" for="new-password">密碼</label>
                    <input class="form-input" type="password" id="new-password" placeholder="至少 6 位數密碼" required minlength="6">
                </div>
                <div class="form-group">
                    <label class="form-label" for="new-role">帳戶角色</label>
                    <select class="form-select" id="new-role" required>
                        <option value="user">一般使用者 (user)</option>
                        <option value="admin">管理者 (admin)</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeCreateUserModal()">取消</button>
                    <button type="submit" class="btn btn-primary" id="btn-create-submit">建立帳戶</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit User Modal -->
    <div class="modal-overlay" id="edit-user-modal" style="display: none;">
        <div class="modal-content">
            <h2 style="margin-bottom: 20px; border-left: 3px solid var(--accent-green); padding-left: 10px; font-size: 18px;">編輯使用者帳戶</h2>
            
            <form id="edit-user-form" onsubmit="handleSaveEditUser(event)">
                <input type="hidden" id="edit-username-hidden">
                
                <div class="form-group">
                    <label class="form-label">帳號</label>
                    <input class="form-input" type="text" id="edit-username-display" disabled style="opacity: 0.6; cursor: not-allowed;">
                </div>
                <div class="form-group">
                    <label class="form-label" for="edit-name">真實姓名</label>
                    <input class="form-input" type="text" id="edit-name" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="edit-email">Email</label>
                    <input class="form-input" type="email" id="edit-email" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="edit-phone">電話</label>
                    <input class="form-input" type="text" id="edit-phone" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="edit-address">地址</label>
                    <input class="form-input" type="text" id="edit-address" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="edit-role">帳戶角色</label>
                    <select class="form-select" id="edit-role" required>
                        <option value="user">一般使用者 (user)</option>
                        <option value="admin">管理者 (admin)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="edit-cash">可用資金 (TWD)</label>
                    <input class="form-input" type="number" id="edit-cash" required min="0">
                </div>
                <div class="form-group">
                    <label class="form-label" for="edit-avatar">大頭照上傳</label>
                    <input class="form-input" type="file" id="edit-avatar" accept="image/*" onchange="uploadAvatarFile(this, 'edit-avatar-url', 'edit-avatar-preview')">
                    <input type="hidden" id="edit-avatar-url">
                    <div style="margin-top: 8px;" id="edit-avatar-preview-container">
                        <img id="edit-avatar-preview" src="" style="width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent-green);">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="edit-status">帳戶狀態</label>
                    <select class="form-select" id="edit-status" required>
                        <option value="1">啟用 (Active)</option>
                        <option value="0">停用 (Disabled)</option>
                    </select>
                </div>
                
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeEditUserModal()">取消</button>
                    <button type="submit" class="btn btn-primary" id="btn-save-edit-submit">儲存修改</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const formError = document.getElementById('form-error');
        const formSuccess = document.getElementById('form-success');
        const usersListBody = document.getElementById('users-list-body');
        const currentAdminUser = localStorage.getItem('username');

        function showMessage(type, message) {
            formError.style.display = 'none';
            formSuccess.style.display = 'none';
            if (type === 'error') {
                formError.textContent = message;
                formError.style.display = 'block';
            } else {
                formSuccess.textContent = message;
                formSuccess.style.display = 'block';
            }
        }

        async function fetchUsers() {
            try {
                const response = await fetch('/api/admin/users', {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });
                
                if (response.status === 401) {
                    handleLogout();
                    return;
                }
                
                const data = await response.json();
                if (response.ok && data.status === 200) {
                    renderUsersTable(data.result);
                } else {
                    console.error('Failed to load user list', data);
                }
            } catch (err) {
                console.error('Error fetching user list:', err);
            }
        }

        let allCachedUsers = []; // Cache list of users to reference when editing

        function renderUsersTable(users) {
            allCachedUsers = users;
            usersListBody.innerHTML = '';
            users.forEach(user => {
                const tr = document.createElement('tr');
                
                const roleClass = user.role === 'admin' ? 'role-admin' : 'role-user';
                const isSelf = user.username === currentAdminUser;
                const formattedCash = new Intl.NumberFormat('zh-TW', { style: 'currency', currency: 'TWD', minimumFractionDigits: 0 }).format(user.cash);
                const avatarSrc = user.profile_pic || '/uploads/default-avatar.png';
                
                // Status badge
                const statusBadge = user.is_active === 1 
                    ? `<span class="role-badge" style="background: rgba(8, 153, 129, 0.15); color: #0ada9b; border: 1px solid rgba(8, 153, 129, 0.2);">使用中</span>`
                    : `<span class="role-badge" style="background: rgba(242, 54, 69, 0.15); color: #ff5a6a; border: 1px solid rgba(242, 54, 69, 0.2);">已停用</span>`;

                const statusBtnText = user.is_active === 1 ? '停用' : '啟用';
                const statusBtnClass = user.is_active === 1 ? 'btn-delete' : 'btn-delete'; // reuse styles
                const statusBtnStyle = user.is_active === 1 
                    ? 'background: rgba(242, 54, 69, 0.1); color: #ff5a6a; border: 1px solid rgba(242, 54, 69, 0.2);' 
                    : 'background: rgba(0, 176, 107, 0.1); color: #00d984; border: 1px solid rgba(0, 176, 107, 0.2);';

                tr.innerHTML = `
                    <td style="font-weight: 500;">
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <img src="${avatarSrc}" onerror="this.src='/uploads/default-avatar.png'" style="width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border-color);">
                            <div>
                                <div style="font-weight: 600; color: #fff;">${user.username}</div>
                                ${isSelf ? '<span style="color: var(--text-secondary); font-size: 10px;">(您自己)</span>' : ''}
                            </div>
                        </div>
                    </td>
                    <td>
                        <div style="font-size: 12px; line-height: 1.4; color: var(--text-secondary);">
                            <div><b>姓名:</b> ${user.name || '-'}</div>
                            <div><b>信箱:</b> ${user.email || '-'}</div>
                            <div><b>電話:</b> ${user.phone || '-'}</div>
                            <div><b>地址:</b> ${user.address || '-'}</div>
                        </div>
                    </td>
                    <td><span class="role-badge ${roleClass}">${user.role}</span></td>
                    <td style="font-family: 'Outfit', monospace; color: var(--accent-green); font-weight: 600;">${formattedCash}</td>
                    <td>${statusBadge}</td>
                    <td>
                        <div style="display: flex; gap: 8px;">
                            <button class="btn-secondary" style="padding: 6px 12px; font-size: 12px; height: 28px;" onclick="openEditUser('${user.username}')">
                                編輯
                            </button>
                            <button class="btn-delete" style="${statusBtnStyle} padding: 6px 12px; font-size: 12px; height: 28px;" onclick="toggleUserStatus('${user.username}')" ${isSelf ? 'disabled' : ''}>
                                ${statusBtnText}
                            </button>
                            <button class="btn-delete" style="padding: 6px 12px; font-size: 12px; height: 28px;" onclick="deleteUser('${user.username}')" ${isSelf ? 'disabled' : ''}>
                                刪除
                            </button>
                        </div>
                    </td>
                `;
                usersListBody.appendChild(tr);
            });
        }

        async function uploadAvatarFile(input, targetUrlInputId, previewImgId) {
            if (!input.files || input.files.length === 0) return;
            const file = input.files[0];
            
            const formData = new FormData();
            formData.append("file", file);
            
            try {
                const response = await fetch('/api/upload_avatar', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                if (response.ok && data.status === 200) {
                    document.getElementById(targetUrlInputId).value = data.result.avatar_url;
                    const previewImg = document.getElementById(previewImgId);
                    previewImg.src = data.result.avatar_url;
                    previewImg.style.display = 'block';
                    alert('圖片上傳成功！');
                } else {
                    alert(data.detail || '圖片上傳失敗');
                }
            } catch (err) {
                alert('上傳失敗，伺服器連線異常。');
            }
        }

        function openEditUser(username) {
            const user = allCachedUsers.find(u => u.username === username);
            if (!user) return;
            
            document.getElementById('edit-username-hidden').value = user.username;
            document.getElementById('edit-username-display').value = user.username;
            document.getElementById('edit-name').value = user.name || '';
            document.getElementById('edit-email').value = user.email || '';
            document.getElementById('edit-phone').value = user.phone || '';
            document.getElementById('edit-address').value = user.address || '';
            document.getElementById('edit-role').value = user.role;
            document.getElementById('edit-cash').value = user.cash;
            document.getElementById('edit-status').value = user.is_active;
            document.getElementById('edit-avatar-url').value = user.profile_pic || '';
            
            const previewImg = document.getElementById('edit-avatar-preview');
            if (user.profile_pic) {
                previewImg.src = user.profile_pic;
                previewImg.style.display = 'block';
            } else {
                previewImg.src = '';
                previewImg.style.display = 'none';
            }
            
            document.getElementById('edit-user-modal').style.display = 'flex';
        }

        function closeEditUserModal() {
            document.getElementById('edit-user-modal').style.display = 'none';
        }

        async function handleSaveEditUser(e) {
            e.preventDefault();
            const username = document.getElementById('edit-username-hidden').value;
            const name = document.getElementById('edit-name').value.trim();
            const email = document.getElementById('edit-email').value.trim();
            const phone = document.getElementById('edit-phone').value.trim();
            const address = document.getElementById('edit-address').value.trim();
            const role = document.getElementById('edit-role').value;
            const cash = parseFloat(document.getElementById('edit-cash').value);
            const is_active = parseInt(document.getElementById('edit-status').value);
            const profile_pic = document.getElementById('edit-avatar-url').value;

            const submitBtn = document.getElementById('btn-save-edit-submit');
            submitBtn.disabled = true;
            submitBtn.textContent = '儲存中...';

            try {
                const response = await fetch(`/api/admin/update_user/${username}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify({ role, email, name, phone, address, profile_pic, is_active, cash })
                });

                const data = await response.json();
                if (response.ok && data.status === 200) {
                    alert('帳戶資訊修改成功！');
                    closeEditUserModal();
                    fetchUsers();
                } else {
                    alert(data.detail || '修改失敗');
                }
            } catch (err) {
                alert('連線伺服器失敗，請確認網路狀態。');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '儲存修改';
            }
        }

        async function toggleUserStatus(username) {
            try {
                const response = await fetch(`/api/admin/toggle_user/${username}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });

                const data = await response.json();
                if (response.ok && data.status === 200) {
                    fetchUsers();
                } else {
                    alert(data.detail || '操作失敗');
                }
            } catch (err) {
                alert('連線伺服器失敗，操作取消。');
            }
        }

        window.openCreateUserModal = function() {
            formError.style.display = 'none';
            formSuccess.style.display = 'none';
            document.getElementById('new-username').value = '';
            document.getElementById('new-password').value = '';
            document.getElementById('new-role').value = 'user';
            document.getElementById('create-user-modal').style.display = 'flex';
        };

        window.closeCreateUserModal = function() {
            document.getElementById('create-user-modal').style.display = 'none';
        };

        async function handleCreateUser(e) {
            e.preventDefault();
            formError.style.display = 'none';
            formSuccess.style.display = 'none';

            const usernameInput = document.getElementById('new-username');
            const passwordInput = document.getElementById('new-password');
            const roleSelect = document.getElementById('new-role');
            const submitBtn = document.getElementById('btn-create-submit');

            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            const role = roleSelect.value;

            submitBtn.disabled = true;
            submitBtn.textContent = '建立中...';

            try {
                const response = await fetch('/api/admin/create_user', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify({ username, password, role })
                });

                const data = await response.json();
                if (response.ok && data.status === 200) {
                    showMessage('success', `帳戶 '${username}' 開立成功！`);
                    usernameInput.value = '';
                    passwordInput.value = '';
                    roleSelect.value = 'user';
                    setTimeout(() => {
                        closeCreateUserModal();
                        fetchUsers();
                    }, 1000);
                } else {
                    showMessage('error', data.detail || '帳戶開立失敗，名稱可能已被佔用');
                }
            } catch (err) {
                showMessage('error', '連線伺服器失敗，請檢查網路狀態。');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '建立帳戶';
            }
        }

        async function deleteUser(username) {
            if (!confirm(`確定要永久刪除帳戶 '${username}' 嗎？此操作將同時清空其資產、庫存與歷史紀錄！`)) {
                return;
            }

            try {
                const response = await fetch(`/api/admin/delete_user/${username}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });

                const data = await response.json();
                if (response.ok && data.status === 200) {
                    fetchUsers();
                } else {
                    alert(data.detail || '刪除失敗');
                }
            } catch (err) {
                alert('連線伺服器失敗，刪除操作取消。');
            }
        }

        function handleLogout() {
            localStorage.clear();
            window.location.href = '/login.html';
        }

        async function fetchAceConfig() {
            try {
                const response = await fetch('/api/admin/ace/config', {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });
                const data = await response.json();
                if (response.ok && data.status === 200) {
                    document.getElementById('ace-url').value = data.result.wearn_excel_url || '';
                    document.getElementById('ace-cookies').value = data.result.wearn_cookies || '';
                    
                    const statusSpan = document.getElementById('ace-file-status');
                    if (data.result.today_file_exists) {
                        statusSpan.innerHTML = `<span style="color: var(--success-color); font-weight: 600;">今日已下載 (${data.result.today_file_name})</span>`;
                    } else {
                        statusSpan.innerHTML = `<span style="color: var(--text-secondary);">今日無下載檔案</span>`;
                    }
                }
            } catch (err) {
                console.error('Error fetching Ace Config:', err);
            }
        }

        async function saveAceConfig(e) {
            e.preventDefault();
            const url = document.getElementById('ace-url').value.trim();
            const cookies = document.getElementById('ace-cookies').value.trim();
            const submitBtn = document.getElementById('btn-save-ace-config');
            
            submitBtn.disabled = true;
            submitBtn.textContent = '儲存中...';
            
            try {
                const response = await fetch('/api/admin/ace/config', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify({ wearn_excel_url: url, wearn_cookies: cookies })
                });
                const data = await response.json();
                if (response.ok && data.status === 200) {
                    alert('下載設定儲存成功！');
                    fetchAceConfig();
                } else {
                    alert(data.detail || '儲存失敗');
                }
            } catch (err) {
                alert('連線伺服器失敗，儲存設定失敗。');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '儲存下載設定';
            }
        }

        async function uploadAceExcelFile() {
            const fileInput = document.getElementById('ace-file-upload');
            if (!fileInput.files || fileInput.files.length === 0) {
                alert('請選擇要上傳的 Excel (.xlsx, .xls) 檔案。');
                return;
            }
            const file = fileInput.files[0];
            const submitBtn = document.getElementById('btn-upload-ace-excel');
            
            submitBtn.disabled = true;
            submitBtn.textContent = '處理中...';
            
            const formData = new FormData();
            formData.append("file", file);
            
            try {
                const response = await fetch('/api/admin/ace/upload', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: formData
                });
                const data = await response.json();
                if (response.ok && data.status === 200) {
                    alert(`上傳成功！已同步 ${data.result.symbols.length} 檔選股股票。`);
                    fileInput.value = '';
                    fetchAceConfig();
                } else {
                    alert(data.detail || '解析上傳檔案失敗。');
                }
            } catch (err) {
                alert('連線伺服器失敗，上傳取消。');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '上傳並同步';
            }
        }

        async function clearAceData() {
            if (!confirm('確定要清除當前所有的艾斯選股資料庫名單，並刪除伺服器上的所有 Excel 歷史暫存檔嗎？此動作不可逆！')) {
                return;
            }
            const submitBtn = document.getElementById('btn-clear-ace-data');
            submitBtn.disabled = true;
            
            try {
                const response = await fetch('/api/admin/ace/clear', {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });
                const data = await response.json();
                if (response.ok && data.status === 200) {
                    alert(data.message);
                    fetchAceConfig();
                } else {
                    alert(data.detail || '清除失敗');
                }
            } catch (err) {
                alert('連線伺服器失敗，清除操作取消。');
            } finally {
                submitBtn.disabled = false;
            }
        }

        // Initialize user table list
        fetchUsers();
        fetchAceConfig();
    </script>
</body>
</html>
